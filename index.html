<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Wallace Lira - Login</title>

    <link rel="icon" type="image/png" sizes="32x32" href="favicon.png">
    <link rel="apple-touch-icon" sizes="180x180" href="favicon.png">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #loginScreen {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 40px;
            max-width: 400px;
            width: 100%;
        }

        #loginScreen h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 24px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
        }

        button {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }

        button:hover:not(:disabled) {
            background: #5568d3;
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .error-message {
            color: #e74c3c;
            font-size: 14px;
            margin-top: 15px;
            padding: 10px;
            background: #fadbd8;
            border-radius: 5px;
            display: none;
            text-align: center;
        }

        #dashboardScreen {
            display: none;
            width: 100%;
            height: 100vh;
            flex-direction: column;
        }

        #dashboardScreen header {
            background: #1c1d1f;
            color: #eceae4;
            padding: 10px 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #2a2d31;
            min-height: 42px;
        }

        #dashboardScreen header h1 {
            font-size: 15px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        #dashboardScreen header .user-info {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        #dashboardScreen header .user-email {
            font-size: 12px;
            color: #8a8880;
        }

        #dashboardScreen header .logout-btn {
            width: 28px;
            height: 28px;
            padding: 0;
            border-radius: 50%;
            background: transparent;
            border: 1px solid #3a3d42;
            color: #8a8880;
            font-size: 13px;
            line-height: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.15s;
        }

        #dashboardScreen header .logout-btn:hover {
            background: rgba(231, 76, 60, 0.12);
            border-color: #e74c3c;
            color: #e74c3c;
        }

        @media (max-width: 560px) {
            #dashboardScreen header {
                padding: 8px 12px;
                min-height: 38px;
            }
            #dashboardScreen header h1 {
                font-size: 13px;
            }
            #dashboardScreen header .user-email {
                display: none;
            }
            #dashboardScreen header .logout-btn {
                width: 24px;
                height: 24px;
                font-size: 11px;
            }
        }

        #dashboardContent {
            flex: 1;
            overflow: hidden;
        }
        #dashboardContent iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
    </style>
</head>
<body>
    <div id="loginScreen">
        <h1>🔐 Sistema Wallace Lira</h1>
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="seu@email.com">
        </div>
        <div class="form-group">
            <label for="password">Senha</label>
            <input type="password" id="password" placeholder="Sua senha">
        </div>
        <button id="loginBtn">Entrar</button>
        <div class="error-message" id="errorMessage"></div>
    </div>

    <div id="dashboardScreen">
        <header>
            <h1>📊 Sistema Wallace Lira</h1>
            <div class="user-info">
                <span id="userEmail" class="user-email"></span>
                <button id="logoutBtn" class="logout-btn" title="Sair" aria-label="Sair">
                    <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                        <polyline points="16 17 21 12 16 7"></polyline>
                        <line x1="21" y1="12" x2="9" y2="12"></line>
                    </svg>
                </button>
            </div>
        </header>
        <div id="dashboardContent"></div>
    </div>

    <!-- CARREGAMENTO DIRETO DO FIREBASE SCRIPT GLOBAL -->
    <script>
        // Sem módulos ES6, usando callbacks diretos
        window.firebaseConfig = {
            apiKey: "AIzaSyCvXsD2v_AGx3vN3kM2z_uIllkRO-Lr2pc",
            authDomain: "sistema-wallace-lira.firebaseapp.com",
            projectId: "sistema-wallace-lira",
            storageBucket: "sistema-wallace-lira.firebasestorage.app",
            messagingSenderId: "648799873363",
            appId: "1:648799873363:web:28e6796ee70afc3a4b99a6"
        };

        window.authObj = null;

        // Função auxiliar para fazer fetch
        function firebaseAuth(email, password) {
            const url = "https://identitytoolkit.googleapis.com/v1/accounts:signInWithPassword?key=" + window.firebaseConfig.apiKey;
            
            return fetch(url, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    email: email,
                    password: password,
                    returnSecureToken: true
                })
            })
            .then(response => response.json())
            .then(data => {
                if (data.error) {
                    throw new Error(data.error.message);
                }
                return data;
            });
        }

        // LOGIN
        function login() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');
            const errorDiv = document.getElementById('errorMessage');

            errorDiv.style.display = 'none';

            if (!email || !password) {
                showError('Preencha email e senha');
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Entrando...';

            firebaseAuth(email, password)
                .then(response => {
                    console.log('✅ Login bem-sucedido');
                    window.authObj = response;
                    localStorage.setItem('auth', JSON.stringify(response));
                    showDashboard(email);
                })
                .catch(error => {
                    btn.disabled = false;
                    btn.textContent = 'Entrar';
                    
                    let msg = error.message || 'Erro ao fazer login';
                    if (msg.includes('INVALID_LOGIN_CREDENTIALS')) msg = 'Email ou senha incorretos';
                    if (msg.includes('USER_DISABLED')) msg = 'Usuário desativado';
                    
                    showError(msg);
                });
        }

        // MOSTRAR PAINEL
        function showDashboard(email) {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('dashboardScreen').style.display = 'flex';
            document.getElementById('userEmail').textContent = '👤 ' + email;
            loadDashboard();
        }

        // MOSTRAR LOGIN
        function showLoginScreen() {
            document.getElementById('loginScreen').style.display = 'block';
            document.getElementById('dashboardScreen').style.display = 'none';
            document.getElementById('email').value = '';
            document.getElementById('password').value = '';
            // CORREÇÃO: reseta o botão de login, que ficava travado em "Entrando..." / disabled
            // após um login bem-sucedido anterior — isso impedia clicar em "Entrar" de novo depois do logout.
            const loginBtn = document.getElementById('loginBtn');
            loginBtn.disabled = false;
            loginBtn.textContent = 'Entrar';
            document.getElementById('errorMessage').style.display = 'none';
        }

        // CARREGAR PAINEL HTML (via iframe - preserva scripts, Chart.js e datas dinâmicas)
        function loadDashboard() {
            const content = document.getElementById('dashboardContent');
            content.innerHTML = '<p style="padding: 20px; text-align: center;">⏳ Carregando painel...</p>';

            fetch('Sistema_Wallace_Lira_Completo.html', { method: 'HEAD' })
                .then(r => {
                    if (!r.ok) throw new Error('Arquivo não encontrado (status ' + r.status + ')');
                    const iframe = document.createElement('iframe');
                    iframe.src = 'Sistema_Wallace_Lira_Completo.html';
                    iframe.title = 'Sistema Wallace Lira - Painel';
                    content.innerHTML = '';
                    content.appendChild(iframe);
                    console.log('✅ Painel carregado via iframe (scripts e datas dinâmicas ativos)');
                })
                .catch(error => {
                    console.error('❌ Erro:', error);
                    content.innerHTML = '<div style="padding: 40px; text-align: center; color: #e74c3c;"><h2>⚠️ Erro</h2><p>Arquivo "Sistema_Wallace_Lira_Completo.html" não encontrado</p></div>';
                });
        }

        // LOGOUT
        function logout() {
            localStorage.removeItem('auth');
            window.authObj = null;
            document.getElementById('dashboardContent').innerHTML = '';
            showLoginScreen();
        }

        // ERRO
        function showError(msg) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = msg;
            errorDiv.style.display = 'block';
            console.error('❌', msg);
        }

        // EVENTOS
        document.getElementById('loginBtn').addEventListener('click', login);
        document.getElementById('logoutBtn').addEventListener('click', logout);

        document.getElementById('email').addEventListener('keypress', e => {
            if (e.key === 'Enter') login();
        });
        document.getElementById('password').addEventListener('keypress', e => {
            if (e.key === 'Enter') login();
        });

        // VERIFICAR SE JÁ ESTÁ LOGADO
        window.addEventListener('load', () => {
            const auth = localStorage.getItem('auth');
            if (auth) {
                try {
                    window.authObj = JSON.parse(auth);
                    const email = window.authObj.email || 'usuário';
                    showDashboard(email);
                } catch (e) {
                    showLoginScreen();
                }
            }
        });
    </script>
</body>
</html>
